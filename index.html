<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="robots" content="noindex, nofollow">
<title>蔵書リスト検索</title>
<style>
  :root {
    --bg: #f5f3ef; --card: #ffffff; --ink: #2e2a26; --muted: #8a8178;
    --accent: #7a5c3e; --accent-soft: #efe7dc; --line: #e4ddd2;
    --read: #4a8c5f; --unread: #c58a3a;
  }
  * { box-sizing: border-box; }
  body { margin: 0; font-family: "Segoe UI","Hiragino Sans","Yu Gothic UI","Meiryo",sans-serif; background: var(--bg); color: var(--ink); font-size: 15px; }
  header { background: var(--accent); color: #fff; padding: 18px 20px; position: sticky; top: 0; z-index: 20; box-shadow: 0 2px 8px rgba(0,0,0,.12); }
  header h1 { margin: 0; font-size: 20px; font-weight: 700; }
  header .stats { margin-top: 6px; font-size: 13px; opacity: .92; }
  header .stats b { font-weight: 700; }
  .controls { max-width: 1100px; margin: 0 auto; padding: 16px 20px; display: grid; gap: 12px; }
  .row { display: flex; flex-wrap: wrap; gap: 10px; align-items: center; }
  .search-box { flex: 1 1 260px; position: relative; }
  .search-box input { width: 100%; padding: 11px 14px 11px 38px; border: 1px solid var(--line); border-radius: 10px; font-size: 15px; background: var(--card); color: var(--ink); }
  .search-box::before { content: "🔍"; position: absolute; left: 12px; top: 50%; transform: translateY(-50%); font-size: 15px; opacity: .5; }
  select { padding: 10px 12px; border: 1px solid var(--line); border-radius: 10px; background: var(--card); color: var(--ink); font-size: 14px; min-width: 150px; max-width: 100%; }
  .seg { display: inline-flex; border: 1px solid var(--line); border-radius: 10px; overflow: hidden; background: var(--card); }
  .seg button { border: none; background: transparent; padding: 10px 16px; cursor: pointer; font-size: 14px; color: var(--muted); font-family: inherit; }
  .seg button.active { background: var(--accent-soft); color: var(--accent); font-weight: 700; }
  .btn-clear { border: 1px solid var(--line); background: var(--card); color: var(--muted); padding: 10px 14px; border-radius: 10px; cursor: pointer; font-size: 14px; font-family: inherit; }
  .btn-clear:hover { background: #efe9e1; }
  .btn-backup { border: 1px solid var(--accent); background: var(--accent-soft); color: var(--accent); padding: 9px 14px; border-radius: 10px; cursor: pointer; font-size: 13px; font-family: inherit; font-weight: 600; }
  .btn-backup:hover { background: #e6d9c8; }
  .backup-row { border-top: 1px dashed var(--line); padding-top: 12px; margin-top: 2px; }
  .backup-row .hint { color: var(--muted); font-size: 12px; margin-right: auto; }
  .toast { position: fixed; left: 50%; bottom: 26px; transform: translateX(-50%); background: var(--accent); color: #fff; padding: 12px 20px; border-radius: 24px; font-size: 14px; box-shadow: 0 4px 16px rgba(0,0,0,.25); opacity: 0; pointer-events: none; transition: opacity .25s, bottom .25s; z-index: 50; max-width: 90%; text-align: center; }
  .toast.show { opacity: 1; bottom: 34px; }
  .btn-add { border: none; background: #fff; color: var(--accent); padding: 9px 16px; border-radius: 10px; cursor: pointer; font-size: 14px; font-family: inherit; font-weight: 700; }
  .btn-add:hover { background: #f3ebe0; }
  .badge-new { display: inline-block; background: var(--accent-soft); color: var(--accent); font-size: 10px; font-weight: 700; padding: 1px 6px; border-radius: 10px; margin-left: 6px; vertical-align: middle; }
  .btn-del { border: none; background: transparent; color: #c56; cursor: pointer; font-size: 14px; padding: 4px 6px; border-radius: 6px; }
  .btn-del:hover { background: #f7e3e3; }
  .modal-bg { position: fixed; inset: 0; background: rgba(40,34,28,.45); display: none; align-items: flex-start; justify-content: center; z-index: 60; padding: 24px 16px; overflow-y: auto; }
  .modal-bg.show { display: flex; }
  .modal { background: var(--card); border-radius: 14px; width: 100%; max-width: 460px; box-shadow: 0 12px 40px rgba(0,0,0,.3); overflow: hidden; }
  .modal h3 { margin: 0; padding: 16px 20px; background: var(--accent); color: #fff; font-size: 16px; }
  .modal .body { padding: 18px 20px; }
  .modal label { display: block; font-size: 13px; color: var(--muted); margin: 12px 0 4px; font-weight: 600; }
  .modal label:first-child { margin-top: 0; }
  .modal input, .modal textarea { width: 100%; padding: 10px 12px; border: 1px solid var(--line); border-radius: 8px; font-size: 15px; font-family: inherit; background: #fff; color: var(--ink); }
  .modal textarea { resize: vertical; min-height: 46px; }
  .modal .req { color: #c56; }
  .modal .actions { display: flex; gap: 10px; justify-content: flex-end; padding: 4px 20px 20px; }
  .modal .btn-cancel { border: 1px solid var(--line); background: #fff; color: var(--muted); padding: 10px 18px; border-radius: 10px; cursor: pointer; font-size: 14px; font-family: inherit; }
  .modal .btn-save { border: none; background: var(--accent); color: #fff; padding: 10px 20px; border-radius: 10px; cursor: pointer; font-size: 14px; font-family: inherit; font-weight: 700; }
  .modal .btn-save:hover { background: #67492f; }
  .modal.wide { max-width: 520px; }
  .miss-list { max-height: 60vh; overflow-y: auto; padding: 4px 20px 8px; }
  .miss-item { padding: 11px 2px; border-bottom: 1px solid var(--line); }
  .miss-item:last-child { border-bottom: none; }
  .miss-item .s-name { font-weight: 700; color: var(--accent); cursor: pointer; font-size: 15px; }
  .miss-item .s-name:hover { text-decoration: underline; }
  .miss-item .s-sub { font-size: 11px; color: var(--muted); margin-left: 6px; font-weight: 400; }
  .miss-chip { display: inline-block; background: #fbe6d8; color: #a2591e; border: 1px solid #e9c9a8; border-radius: 8px; padding: 2px 9px; font-size: 13px; margin: 5px 5px 0 0; font-weight: 700; }
  .miss-none { text-align: center; padding: 34px 16px; color: var(--muted); font-size: 15px; }
  .miss-note { font-size: 12px; color: var(--muted); padding: 10px 20px 4px; line-height: 1.5; }
  main { max-width: 1100px; margin: 0 auto; padding: 0 20px 60px; }
  .result-info { color: var(--muted); font-size: 13px; margin: 4px 0 12px; }
  .group { margin-bottom: 22px; }
  .group-head { display: flex; align-items: baseline; gap: 10px; padding: 8px 4px; border-bottom: 2px solid var(--accent-soft); margin-bottom: 4px; position: sticky; top: 74px; background: var(--bg); z-index: 5; }
  .group-head h2 { margin: 0; font-size: 16px; color: var(--accent); }
  .group-head .count { font-size: 12px; color: var(--muted); }
  table { width: 100%; border-collapse: collapse; }
  th { text-align: left; font-size: 12px; color: var(--muted); font-weight: 600; padding: 8px 10px; border-bottom: 1px solid var(--line); }
  td { padding: 10px; border-bottom: 1px solid var(--line); vertical-align: middle; }
  tr.book:hover { background: #faf7f2; }
  .col-no { width: 52px; color: var(--muted); font-size: 12px; }
  .col-read { width: 96px; text-align: center; }
  .cell-actions { display: flex; flex-direction: column; gap: 5px; align-items: stretch; }
  .final-toggle { cursor: pointer; border: 1px solid var(--line); background: var(--card); border-radius: 20px; padding: 4px 8px; font-size: 11px; font-family: inherit; color: var(--muted); white-space: nowrap; }
  .final-toggle.is-final { background: #3d6ea5; border-color: #3d6ea5; color: #fff; font-weight: 700; }
  .badge-cat { display: inline-block; font-size: 10px; font-weight: 700; padding: 1px 7px; border-radius: 10px; margin-left: 6px; vertical-align: middle; border: 1px solid; }
  .cat-manga { background: #e8eef7; color: #39679e; border-color: #c3d4ea; }
  .cat-novel { background: #f3ece0; color: #8a6a2f; border-color: #e0d0b0; }
  .cat-other { background: #eeeeee; color: #777777; border-color: #dddddd; }
  .badge-done { display: inline-block; background: #dff0e4; color: #2f7d4c; border: 1px solid #b7ddc3; font-size: 11px; font-weight: 700; padding: 1px 8px; border-radius: 10px; }
  .badge-open { display: inline-block; background: #f3ede2; color: #a2801e; border: 1px solid #e4d6b4; font-size: 11px; font-weight: 700; padding: 1px 8px; border-radius: 10px; }
  .title-main { font-weight: 600; }
  .title-sub { color: var(--muted); font-size: 12px; margin-top: 2px; }
  .meta { color: var(--muted); font-size: 12.5px; }
  .read-toggle { cursor: pointer; border: 1px solid var(--line); background: var(--card); border-radius: 20px; padding: 5px 10px; font-size: 12px; font-family: inherit; color: var(--unread); white-space: nowrap; }
  .read-toggle.is-read { background: var(--read); border-color: var(--read); color: #fff; }
  .empty { text-align: center; color: var(--muted); padding: 60px 20px; }
  .highlight { background: #ffe9a8; border-radius: 3px; }
  footer { text-align:center; color: var(--muted); font-size: 12px; padding: 24px; }
  @media (max-width: 640px) { .col-pub, th.col-pub { display: none; } }
</style>
</head>
<body>
<header>
  <div style="display:flex; align-items:center; justify-content:space-between; gap:12px; flex-wrap:wrap;">
    <h1>📚 蔵書リスト検索</h1>
    <div style="display:flex; gap:8px; flex-wrap:wrap;">
      <button class="btn-add" id="unfinBtn">📖 未完タイトル</button>
      <button class="btn-add" id="missingBtn">📕 抜けている巻</button>
      <button class="btn-add" id="addBtn">＋ 本を追加</button>
    </div>
  </div>
  <div class="stats" id="stats"></div>
</header>
<div class="controls">
  <div class="row">
    <div class="search-box"><input type="text" id="q" placeholder="タイトル・著者・シリーズ・出版社をフリー検索…" autocomplete="off"></div>
    <button class="btn-clear" id="clearBtn">クリア</button>
  </div>
  <div class="row">
    <select id="seriesSel"></select>
    <select id="authorSel"></select>
    <select id="pubSel"></select>
    <div class="seg" id="readSeg">
      <button data-v="all" class="active">すべて</button>
      <button data-v="unread">未読</button>
      <button data-v="read">読了</button>
    </div>
    <div class="seg" id="catSeg">
      <button data-v="all" class="active">全種類</button>
      <button data-v="漫画">漫画</button>
      <button data-v="小説">小説</button>
      <button data-v="他">他</button>
    </div>
    <select id="sortSel">
      <option value="series">シリーズ・巻数順</option>
      <option value="author">著者・巻数順</option>
      <option value="no">登録順（No.）</option>
    </select>
  </div>
  <div class="row backup-row">
    <span class="hint">💾 読了記録の保存・引っ越し用</span>
    <button class="btn-backup" id="exportBtn">記録を書き出す（バックアップ）</button>
    <button class="btn-backup" id="importBtn">記録を読み込む</button>
    <input type="file" id="importFile" accept="application/json,.json" style="display:none">
  </div>
</div>
<main>
  <div class="result-info" id="resultInfo"></div>
  <div id="list"></div>
</main>
<footer>データ 1,415冊 ・ 読了状況はこのブラウザに自動保存されます</footer>
<div class="toast" id="toast"></div>
<div class="modal-bg" id="modalBg">
  <div class="modal">
    <h3>本を追加</h3>
    <div class="body">
      <label>タイトル・巻 <span class="req">※必須</span></label>
      <input type="text" id="f_title" placeholder="例：〇〇物語 3巻" autocomplete="off">
      <label>シリーズ名（任意）</label>
      <input type="text" id="f_series" placeholder="例：本好きの下剋上" autocomplete="off" list="dl_series">
      <label>著者（任意）</label>
      <input type="text" id="f_author" placeholder="例：香月美夜" autocomplete="off" list="dl_author">
      <label>出版社（任意）</label>
      <input type="text" id="f_pub" placeholder="例：TOブックス" autocomplete="off" list="dl_pub">
      <label>分類</label>
      <select id="f_cat">
        <option value="漫画">漫画</option>
        <option value="小説">小説</option>
        <option value="他">他</option>
      </select>
      <label>備考（任意）</label>
      <textarea id="f_note" placeholder="メモなど"></textarea>
    </div>
    <div class="actions">
      <button class="btn-cancel" id="modalCancel">キャンセル</button>
      <button class="btn-save" id="modalSave">追加する</button>
    </div>
  </div>
</div>
<datalist id="dl_series"></datalist>
<datalist id="dl_author"></datalist>
<datalist id="dl_pub"></datalist>
<div class="modal-bg" id="unfinBg">
  <div class="modal wide">
    <h3>📖 未完タイトル（続きが出るシリーズ）</h3>
    <div class="miss-note">「最終巻」にチェックが入っていないシリーズの一覧です。完結したら、そのシリーズの最終巻の <b>🏁</b> ボタンを押すと、このリストから外れます。<br>※ シリーズ名のない単発の本は含みません。</div>
    <div class="miss-list" id="unfinList"></div>
    <div class="actions">
      <button class="btn-cancel" id="unfinClose">閉じる</button>
    </div>
  </div>
</div>
<div class="modal-bg" id="missBg">
  <div class="modal wide">
    <h3>📕 抜けている巻（買い忘れの可能性）</h3>
    <div class="miss-note">各シリーズで「持っている巻の間」に抜けている巻を自動で探しました。シリーズ名を押すと、その本の一覧を表示します。<br>※ 特装版など巻数が読み取れない本、単発の本は対象外です。</div>
    <div class="miss-list" id="missList"></div>
    <div class="actions">
      <button class="btn-cancel" id="missClose">閉じる</button>
    </div>
  </div>
</div>

function escapeHtml(s){ return (s||"").replace(/[&<>"']/g, c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[c])); }
function fillSelect(sel, label, values){
  sel.innerHTML = '<option value="__none__">'+label+' ▾</option>'
    + '<option value="">すべての'+label+'</option>'
    + values.map(v=>'<option value="'+v.replace(/"/g,"&quot;")+'">'+escapeHtml(v)+'</option>').join("");
}
function hl(text, q){
  text = escapeHtml(text);
  if(!q) return text;
  const terms = q.split(/\s+/).filter(Boolean).map(t=>t.replace(/[.*+?^${}()|[\]\\]/g,"\\$&"));
  if(!terms.length) return text;
  try { return text.replace(new RegExp("("+terms.join("|")+")","gi"), '<span class="highlight">$1</span>'); }
  catch(e){ return text; }
}
function fillDatalist(dl, values){ dl.innerHTML = values.map(v=>'<option value="'+v.replace(/"/g,"&quot;")+'">').join(""); }
function rebuildFilters(){

  fillSelect(el("seriesSel"), "シリーズ", s);

  el("pubSel").value = (keepP==="__none__"||keepP===""||p.includes(keepP)) ? keepP : "__none__";
  fillDatalist(el("dl_series"), s);
  fillDatalist(el("dl_author"), a);
  fillDatalist(el("dl_pub"), p);
}

// ---- volume-number extraction for 巻数順 ----
const KMAP = {"〇":0,"零":0,"一":1,"二":2,"三":3,"四":4,"五":5,"六":6,"七":7,"八":8,"九":9,"十":10,"壱":1,"弐":2,"参":3};
function kanjiNum(s){
  if(/^[0-9]+$/.test(s)) return +s;
  if(s.length===1 && KMAP[s]!==undefined) return KMAP[s];
  let m = s.match(/^([一二三四五六七八九壱弐参])?十([一二三四五六七八九壱弐参])?$/);
  if(m) return (m[1]?KMAP[m[1]]:1)*10 + (m[2]?KMAP[m[2]]:0);
  return NaN;
}
const RMAP = {I:1,V:5,X:10,L:50,C:100};
function romanNum(s){
  s = s.toUpperCase(); let n=0, prev=0;
  for(let i=s.length-1;i>=0;i--){ const v=RMAP[s[i]]; if(!v) return NaN; if(v<prev) n-=v; else { n+=v; prev=v; } }
  return n;
}
function toHalf(s){ return (s||"").replace(/[０-９]/g, c=>String.fromCharCode(c.charCodeAt(0)-0xFEE0)); }
function volKey(b){
  const t = toHalf(b.title || "");
  let part = 0, rest = t;
  const pm = t.match(/第\s*([0-9]+|[一二三四五六七八九十壱弐参]+)\s*部/);
  if(pm){ const n = kanjiNum(pm[1]); if(!isNaN(n)) part = n; rest = t.replace(pm[0], " "); }
  let main = Infinity;
  const am = rest.match(/[0-9]+/);
  if(am){ main = +am[0]; }
  else {
    const rm = rest.match(/(?:^|[^0-9A-Za-z])([IVXLC]+)(?:$|[^0-9A-Za-z])/);
    if(rm){ const rn = romanNum(rm[1]); if(!isNaN(rn)) main = rn; }
    else {
      const km = rest.match(/[〇零一二三四五六七八九十壱弐参]+/);
      if(km){ const kn = kanjiNum(km[0]); if(!isNaN(kn)) main = kn; }
    }
  }
  return [part, main, t];
}
function cmpVol(a,b){
  const ka = volKey(a), kb = volKey(b);
  if(ka[0] !== kb[0]) return ka[0]-kb[0];
  if(ka[1] !== kb[1]) return ka[1]-kb[1];
  return ka[2].localeCompare(kb[2],"ja") || a.no-b.no;
}
function matches(b){
  const active = v => v && v !== "__none__";
  if(active(state.series) && b.series !== state.series) return false;
  if(active(state.author) && b.author !== state.author) return false;
  if(active(state.pub) && b.publisher !== state.pub) return false;
  const bookRead = isRead(b.no);
  if(state.read === "read" && !bookRead) return false;
  if(state.read === "unread" && bookRead) return false;
  if(state.cat !== "all" && (b.cat||"") !== state.cat) return false;
  if(state.q){
    const hay = (b.series+" "+b.title+" "+b.author+" "+b.publisher+" "+b.note).toLowerCase();
    const terms = state.q.toLowerCase().split(/\s+/).filter(Boolean);
    if(!terms.every(t=>hay.includes(t))) return false;
  }
  return true;
}
let COMPLETED = new Set();
function render(){
  const q = state.q;
  COMPLETED = completedSeries();
  if(!engaged){
    el("resultInfo").textContent = "";
    el("list").innerHTML = '<div class="empty">🔍 上の検索ボックスに入力するか、シリーズ・著者・出版社のメニューを選ぶと、ここに一覧が表示されます。<br><br>すべての本を見るには、いずれかのメニューで「すべての◯◯」を選んでください。</div>';
    updateStats();
    return;
  }
  let list = ALL().filter(matches);
  const cmp = {
    no: (a,b)=> a.no-b.no,
    series: (a,b)=> (a.series||"￿").localeCompare(b.series||"￿","ja") || cmpVol(a,b),
    author: (a,b)=> (a.author||"￿").localeCompare(b.author||"￿","ja") || (a.series||"￿").localeCompare(b.series||"￿","ja") || cmpVol(a,b),
  }[state.sort];
  list.sort(cmp);
  const readCount = list.filter(b=>isRead(b.no)).length;
  el("resultInfo").textContent = '該当 '+list.length+' 冊（読了 '+readCount+' / 未読 '+(list.length-readCount)+'）';
  const container = el("list");
  if(!list.length){ container.innerHTML = '<div class="empty">条件に一致する本がありません。</div>'; updateStats(); return; }
  let html = "";
  if(state.sort === "no"){ html = tableFor(list, q); }
  else {
    const groups = {};
    list.forEach(b=>{ const k = (state.sort==="series"? b.series : b.author) || "（未分類）"; (groups[k]=groups[k]||[]).push(b); });
    Object.keys(groups).forEach(k=>{
      let badge = "";
      if(state.sort==="series" && k!=="（未分類）"){
        badge = COMPLETED.has(k) ? '<span class="badge-done">完結</span>' : '<span class="badge-open">未完</span>';
      }
      html += '<div class="group"><div class="group-head"><h2>'+escapeHtml(k)+'</h2>'+badge+'<span class="count">'+groups[k].length+'冊</span></div>'+tableFor(groups[k], q)+'</div>';
    });
  }
  container.innerHTML = html;
  updateStats();
}
function tableFor(list, q){
  let rows = list.map(b=>{
    const bookRead = isRead(b.no);
    const bookFinal = isFinal(b.no);
    const newBadge = b.custom ? '<span class="badge-new">追加</span>' : "";
    const CATCLS = {"漫画":"cat-manga","小説":"cat-novel","他":"cat-other"};
    const catBadge = b.cat ? '<span class="badge-cat '+(CATCLS[b.cat]||"cat-other")+'">'+escapeHtml(b.cat)+'</span>' : "";
    const displayTitle = b.series ? '<span class="title-main">'+hl(b.series+" "+b.title, q)+'</span>' : '<span class="title-main">'+hl(b.title||"（無題）",q)+'</span>';
    const delBtn = b.custom ? '<button class="btn-del" data-del="'+b.no+'" title="この追加した本を削除">🗑</button>' : "";
    const finalBtn = b.series ? '<button class="final-toggle '+(bookFinal?"is-final":"")+'" data-final="'+b.no+'" title="この巻を最終巻にする（シリーズを完結済みに）">'+(bookFinal?"🏁 最終巻":"🏁 最終巻?")+'</button>' : "";
    return '<tr class="book">'
      + '<td class="col-no">'+b.no+'</td>'
      + '<td>'+displayTitle+catBadge+newBadge+(b.note?'<div class="title-sub">📝 '+hl(b.note,q)+'</div>':"")+'</td>'
      + '<td class="meta">'+hl(b.author,q)+'</td>'
      + '<td class="meta col-pub">'+hl(b.publisher,q)+'</td>'
      + '<td class="col-read"><div class="cell-actions"><button class="read-toggle '+(bookRead?"is-read":"")+'" data-no="'+b.no+'">'+(bookRead?"✓ 読了":"未読")+'</button>'+finalBtn+delBtn+'</div></td>'
      + '</tr>';
  }).join("");
  return '<table><thead><tr><th class="col-no">No.</th><th>タイトル</th><th>著者</th><th class="col-pub">出版社</th><th class="col-read">状態</th></tr></thead><tbody>'+rows+'</tbody></table>';
}
function updateStats(){
  const all = ALL();
  const total = all.length;
  const read = all.filter(b=>isRead(b.no)).length;
  el("stats").innerHTML = '全 <b>'+total.toLocaleString()+'</b> 冊 ・ 読了 <b>'+read.toLocaleString()+'</b> ・ 未読 <b>'+(total-read).toLocaleString()+'</b>';
}

el("list").addEventListener("click", e=>{
  const del = e.target.closest(".btn-del");
  if(del){
    const no = Number(del.dataset.del);
    const bk = CUSTOM.find(b=>b.no===no);
    if(!bk) return;
    if(!confirm('「'+((bk.series?bk.series+" ":"")+bk.title)+'」を削除します。よろしいですか？')) return;
    CUSTOM = CUSTOM.filter(b=>b.no!==no);
    readSet.delete(no); unreadSet.delete(no); finalSet.delete(no); unfinalSet.delete(no);
    saveCustom(); saveRead(); saveFinal();
    rebuildFilters(); render();
    toast("削除しました");
    return;
  }
  const fin = e.target.closest(".final-toggle");
  if(fin){
    const no = Number(fin.dataset.final);
    toggleFinal(no);
    render();
    toast(isFinal(no) ? "最終巻に設定：シリーズを完結済みにしました" : "完結の設定を解除しました");
    return;
  }
  const btn = e.target.closest(".read-toggle"); if(!btn) return;
  const no = Number(btn.dataset.no);
  setRead(no, !isRead(no));
  updateStats();
  if(state.read !== "all"){ render(); }
  else {
    const nowRead = isRead(no);
    btn.classList.toggle("is-read", nowRead);
    btn.textContent = nowRead ? "✓ 読了" : "未読";
    const list = ALL().filter(matches);
    const rc = list.filter(b=>isRead(b.no)).length;
    el("resultInfo").textContent = '該当 '+list.length+' 冊（読了 '+rc+' / 未読 '+(list.length-rc)+'）';
  }
});
// ---- backup: export / import ----
let toastTimer;
function toast(msg){
  const t = el("toast"); t.textContent = msg; t.classList.add("show");
  clearTimeout(toastTimer); toastTimer = setTimeout(()=>t.classList.remove("show"), 2800);
}
function pad(n){ return String(n).padStart(2,"0"); }
el("exportBtn").addEventListener("click", ()=>{
  const now = new Date();
  const stamp = now.getFullYear()+pad(now.getMonth()+1)+pad(now.getDate())+"_"+pad(now.getHours())+pad(now.getMinutes());
  const effRead = ALL().filter(b=>isRead(b.no)).map(b=>b.no);
  const effFinal = ALL().filter(b=>isFinal(b.no)).map(b=>b.no);
  const payload = { app:"zousho", version:5, exportedAt: now.toISOString(), total: ALL().length, read: effRead, readRemoved:[...unreadSet], final: effFinal, finalRemoved:[...unfinalSet], custom: CUSTOM };
  const blob = new Blob([JSON.stringify(payload, null, 2)], {type:"application/json"});
  const a = document.createElement("a");
  a.href = URL.createObjectURL(blob);
  a.download = "蔵書_読了記録_"+stamp+".json";
  document.body.appendChild(a); a.click(); a.remove();
  setTimeout(()=>URL.revokeObjectURL(a.href), 1000);
  toast("記録を書き出しました（読了"+effRead.length+"件・追加した本"+CUSTOM.length+"冊）");
});
el("importBtn").addEventListener("click", ()=> el("importFile").click());
el("importFile").addEventListener("change", (e)=>{
  const file = e.target.files[0]; if(!file) return;
  const reader = new FileReader();
  reader.onload = ()=>{
    let data;
    try { data = JSON.parse(reader.result); } catch(err){ toast("読み込めませんでした（ファイル形式が不正です）"); e.target.value=""; return; }
    const incomingRead = Array.isArray(data) ? data : (data && Array.isArray(data.read) ? data.read : null);
    const incomingRemoved = (data && Array.isArray(data.readRemoved)) ? data.readRemoved.map(Number) : [];
    const incomingCustom = (data && Array.isArray(data.custom)) ? data.custom : [];
    const incomingFinal = (data && Array.isArray(data.final)) ? data.final.map(Number) : [];
    const incomingFinalRemoved = (data && Array.isArray(data.finalRemoved)) ? data.finalRemoved.map(Number) : [];
    if(!incomingRead && !incomingCustom.length && !incomingFinal.length){ toast("記録が見つかりませんでした"); e.target.value=""; return; }
    const readCountBefore = readCountAll(), customBefore = CUSTOM.length, finalBefore = finalCountAll();
    const ok = confirm("バックアップを現在のデータに統合します。\n・読了記録 "+((incomingRead||[]).length)+"件\n・完結マーク "+incomingFinal.length+"件\n・追加した本 "+incomingCustom.length+"冊\n（今のデータは消えず、両方が合わさります）\n\nよろしいですか？");
    if(!ok){ e.target.value=""; return; }
    const readArr = (incomingRead||[]).map(Number);
    // merge custom books (dedupe by series+title+author signature)
    const sig = b => (b.series||"")+"｜"+(b.title||"")+"｜"+(b.author||"");
    const existing = new Set(ALL().map(sig));
    incomingCustom.forEach(b=>{
      if(!b || !b.title) return;
      if(existing.has(sig(b))) return;
      const nb = { no: nextNo(), series:(b.series||"").trim(), title:String(b.title).trim(), author:(b.author||"").trim(), publisher:(b.publisher||"").trim(), note:(b.note||"").trim(), cat:(b.cat||"漫画"), custom:true };
      CUSTOM.push(nb); existing.add(sig(nb));
      if(readArr.includes(Number(b.no))) readSet.add(nb.no);
      if(incomingFinal.includes(Number(b.no))) finalSet.add(nb.no);
    });
    // merge marks for base books (nos <= base length are stable)
    readArr.forEach(num=>{ if(!Number.isNaN(num) && num<=BASE.length){ readSet.add(num); unreadSet.delete(num); } });
    incomingRemoved.forEach(num=>{ if(!Number.isNaN(num) && num<=BASE.length){ unreadSet.add(num); readSet.delete(num); } });
    incomingFinal.forEach(num=>{ if(!Number.isNaN(num) && num<=BASE.length){ finalSet.add(num); unfinalSet.delete(num); } });
    incomingFinalRemoved.forEach(num=>{ if(!Number.isNaN(num) && num<=BASE.length){ unfinalSet.add(num); finalSet.delete(num); } });
    saveRead(); saveCustom(); saveFinal();
    rebuildFilters(); render();
    toast("読み込み完了：読了+"+(readCountAll()-readCountBefore)+" / 完結+"+(finalCountAll()-finalBefore)+" / 追加した本+"+(CUSTOM.length-customBefore));
    e.target.value="";
  };
  reader.readAsText(file, "utf-8");
});

// ---- missing volumes (買い忘れ) ----
function computeMissing(){
  const bySeries = {};
  ALL().forEach(b=>{ const s=(b.series||"").trim(); if(!s) return; (bySeries[s]=bySeries[s]||[]).push(b); });
  const out = [];
  Object.keys(bySeries).sort((a,b)=>a.localeCompare(b,"ja")).forEach(series=>{
    const parts = {};
    bySeries[series].forEach(b=>{
      const k = volKey(b), part = k[0], main = k[1];
      if(!isFinite(main)) return;
      (parts[part] = parts[part] || new Set()).add(Math.trunc(main));
    });
    const gaps = [];
    Object.keys(parts).map(Number).sort((a,b)=>a-b).forEach(part=>{
      const nums = [...parts[part]].sort((a,b)=>a-b);
      if(nums.length < 2) return;
      const have = new Set(nums), miss = [];
      for(let v=nums[0]; v<=nums[nums.length-1]; v++){ if(!have.has(v)) miss.push(v); }
      if(miss.length) gaps.push({ part, miss });
    });
    if(gaps.length) out.push({ series, gaps });
  });
  return out;
}
function renderMissing(){
  const data = computeMissing();
  const box = el("missList");
  const totalVols = data.reduce((s,d)=> s + d.gaps.reduce((n,g)=>n+g.miss.length,0), 0);
  if(!data.length){
    box.innerHTML = '<div class="miss-none">🎉 抜けている巻は見つかりませんでした！</div>';
    return;
  }
  let html = '<div class="miss-note" style="padding:0 2px 6px;"><b style="color:var(--accent)">'+data.length+'</b> シリーズで、合わせて <b style="color:var(--accent)">'+totalVols+'</b> 冊の抜けが見つかりました。</div>';
  html += data.map(d=>{
    const chips = d.gaps.map(g=>{
      const label = g.part>0 ? ('第'+g.part+'部 ') : '';
      return g.miss.map(v=> '<span class="miss-chip">'+label+v+'</span>').join("");
    }).join("");
    const cnt = d.gaps.reduce((n,g)=>n+g.miss.length,0);
    return '<div class="miss-item"><span class="s-name" data-series="'+escapeHtml(d.series).replace(/"/g,"&quot;")+'">'+escapeHtml(d.series)+'</span>'
      + '<span class="s-sub">'+cnt+'冊</span><div>'+chips+'</div></div>';
  }).join("");
  box.innerHTML = html;
}
function openMissing(){ renderMissing(); el("missBg").classList.add("show"); }
function closeMissing(){ el("missBg").classList.remove("show"); }

// ---- unfinished titles (未完タイトル) ----
function computeUnfinished(){
  const bySeries = {};
  ALL().forEach(b=>{ const s=(b.series||"").trim(); if(!s) return; (bySeries[s]=bySeries[s]||[]).push(b); });
  const done = completedSeries();
  const out = [];
  Object.keys(bySeries).sort((a,b)=>a.localeCompare(b,"ja")).forEach(series=>{
    if(done.has(series)) return;
    const books = bySeries[series];
    let maxV = 0;
    books.forEach(b=>{ const m = volKey(b)[1]; if(isFinite(m) && m>maxV) maxV = m; });
    out.push({ series, count: books.length, maxV });
  });
  return out;
}
function renderUnfinished(){
  const data = computeUnfinished();
  const box = el("unfinList");
  if(!data.length){
    box.innerHTML = '<div class="miss-none">🎉 未完のシリーズはありません！<br>（すべてのシリーズが完結済みです）</div>';
    return;
  }
  let html = '<div class="miss-note" style="padding:0 2px 6px;"><b style="color:var(--accent)">'+data.length+'</b> シリーズが未完（続きが出る可能性）です。</div>';
  html += data.map(d=>{
    const sub = d.maxV>0 ? ('最新 '+d.maxV+'巻まで所持') : (d.count+'冊所持');
    return '<div class="miss-item"><span class="s-name" data-series="'+escapeHtml(d.series).replace(/"/g,"&quot;")+'">'+escapeHtml(d.series)+'</span>'
      + '<span class="s-sub">'+sub+'</span></div>';
  }).join("");
  box.innerHTML = html;
}
